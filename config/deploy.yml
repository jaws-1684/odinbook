<% require "dotenv"; Dotenv.load(".env") %>
# config/deploy.yml
service: book

image: danscorpan/book

servers:
  web:
    hosts:
      - 62.171.183.69 

registry:
  username: 
  - KAMAL_USERNAME
  password:
  - KAMAL_REGISTRY_PASSWORD

env:
  clear:
    RAILS_SERVE_STATIC_FILES: true # Let Rails serve static files (since no external proxy in production)
    RAILS_LOG_TO_STDOUT: true # Log to STDOUT for Docker logging
  secret:
    - RAILS_MASTER_KEY # Rails master key (provide in .kamal/secrets)
    - DB_URL # Database connection string (provided per env in secrets)
    - DB_HOST
    - POSTGRES_PASSWORD
    - POSTGRES_USER
    - DB_PORT
    - GITHUB_CLIENT_ID
    - GITHUB_CLIENT_SECRET
    - GOOGLE_CLIENT_ID
    - GOOGLE_CLIENT_SECRET
    - AWS_S3_BUCKET
    - AWS_S3_ID
    - AWS_S3_SECRET
    - RESEND_API_KEY
accessories:
  postgres:
    image: postgres:17 # Use the correct version for your app
    host: 62.171.183.69 
    port: 5432
    service: whereswaldo-postgres
    env:
      clear:
        DB_USER: book
        DB: book_production
      secret:
        - POSTGRES_PASSWORD
        - POSTGRES_USER
    files:
      - config/init.sql:/docker-entrypoint-initdb.d/setup.sql    
    directories:
      - data:/var/lib/postgresql/data

proxy:
  ssl: true
  host: book.jawsprojects.net
  app_port: 3000

builder:
  arch: amd64
  args:
    RAILS_ENV: production
  secrets:
    - KAMAL_USERNAME
    - KAMAL_REGISTRY_PASSWORD
    - RAILS_MASTER_KEY
    - SECRET_KEY_BASE
ssh:
  user: jaws
